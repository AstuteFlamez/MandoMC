  capture-message:      "&6&lKOTH &r&8» &e%player% &7is capturing the hill!"
  contested-message:    "&6&lKOTH &r&8» &cThe hill is contested!"
  winner-message:       "&6&lKOTH &r&8» &a%player% &7captured the hill!"
  timeout-message:      "&6&lKOTH &r&8» &cNo winner — KOTH ended."
