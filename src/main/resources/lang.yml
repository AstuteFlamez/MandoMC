# ══════════════════════════════════════════
#  MandoMC  ·  lang.yml
#  All player-facing messages, organised by feature.
#  Colour codes use the & prefix.
#  Placeholders are surrounded by  %percent%  signs.
# ══════════════════════════════════════════

shared:
  no-permission:
    command: "&4&lᴍᴀɴᴅᴏᴍᴄ &r&8» &cYou do not have permission to run this command."
    generic: "&4&lᴍᴀɴᴅᴏᴍᴄ &r&8» &cYou do not have permission."
  players-only:
    blue: "&9&lᴍᴀɴᴅᴏᴍᴄ &r&8» &cPlayers only."
  unknown-sub:
    yellow: "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &cUnknown subcommand."

# ──────────────────────────────────────────
# CORE  (reload command)
#   prefix colour: &4  dark-red
# ──────────────────────────────────────────
core:
  reload:
    no-permission:  "@shared.no-permission.command"
    reloading:      "&4&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Reloading plugin..."
    success:        "&4&lᴍᴀɴᴅᴏᴍᴄ &r&8» &aReload complete."
    failure:        "&4&lᴍᴀɴᴅᴏᴍᴄ &r&8» &cReload failed. Check the console."

# ──────────────────────────────────────────
# LINK / DISCORD ACCOUNT LINKING
#   prefix colour: &9  blue
# ──────────────────────────────────────────
link:
  players-only:    "@shared.players-only.blue"
  already-linked:  "&9&lᴍᴀɴᴅᴏᴍᴄ &r&8» &cYou are already linked to Discord."
  code:            "&9&lᴍᴀɴᴅᴏᴍᴄ &r&8» &aYour link code: &e%code%"
  instructions:    "&9&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Use &b/link %code% &7in Discord."
  success:         "&9&lᴍᴀɴᴅᴏᴍᴄ &r&8» &a✔ Your Discord account has been linked!"
  error:           "&9&lᴍᴀɴᴅᴏᴍᴄ &r&8» &cError generating link code. Try again later."

# ──────────────────────────────────────────
# DISCORD COMMAND  (/discord)
# ──────────────────────────────────────────
discord:
  players-only:  "@shared.players-only.blue"
  # fallback clickable message sent before the dialog opens
  join-link:     "&9&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Join our Discord: &b%link%"

# ──────────────────────────────────────────
# EVENTS  (/event)
#   prefix colour: &e  yellow
# ──────────────────────────────────────────
events:
  players-only:   "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &cPlayers only."
  no-permission:  "@shared.no-permission.command"
  unknown-sub:    "@shared.unknown-sub.yellow"

  usage:
    start:   "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &cUsage: /event start <id>"
    next:    "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Usage: /event next <id>"
    enable:  "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Usage: /event enable <id>"
    disable: "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Usage: /event disable <id>"

  # console-only help lines (when sender is not a player)
  help:
    gui:      "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7/event gui"
    start:    "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7/event start <id>"
    stop:     "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7/event stop"
    forceend: "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7/event forceend"
    next:     "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7/event next <id>"
    reroll:   "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7/event reroll"
    status:   "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7/event status"
    list:     "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7/event list"
    reload:   "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7/event reload"
    enable:   "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7/event enable <id>"
    disable:  "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7/event disable <id>"

  start:
    success:  "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Started event &f%id%"
    failure:  "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Could not start event &f%id%"

  stop:
    no-active:    "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7No active event."
    force-ended:  "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Force-ended the active event."

  next:
    queued:   "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Queued next event: &f%id%"
    failure:  "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Could not queue event &f%id%"

  reroll:
    no-eligible:  "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7No eligible event could be selected."
    success:      "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Rerolled next event to &f%event%"

  reload-done: "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Reloaded the event system."

  status:
    header:    "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Event Status"
    state:     "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7State: &f%state%"
    active:    "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Active: &f%active%"
    queued:    "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Queued: &f%queued%"
    next-hour: "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Next hour in: &f%seconds%s"

  list:
    header: "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Configured Events:"
    entry:  "&8- &f%id%"

  enable:
    success:  "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Enabled &f%id%"
    failure:  "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Failed to enable &f%id%"

  disable:
    success:  "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Disabled &f%id%"
    failure:  "&e&lᴍᴀɴᴅᴏᴍᴄ &r&8» &7Failed to disable &f%id%"

  # Broadcast titles shown to all players when an event starts / ends
  broadcast:
    started-title:   "&a&lEVENT STARTED"
    ended-title:     "&c&lEVENT ENDED"

  menu:
    current:
      title:      "&aCurrent Event"
      none-title: "&cNo Active Event"
      none-lore:  "&7There is no event running."
      state:      "&7State: &f%state%"
    next:
      title:        "&6Next Event"
      queued:       "&7Queued: &f%event%"
      not-selected: "Not selected"
      starts-in:    "&7Starts in: &f%time%"
    chances:
      title: "&bEvent Chances"
      entry: "&7%event% &f- %chance%%"
      empty: "&7No eligible events."
    state:
      idle:          "Idle"
      starting-soon: "Starting Soon"
      running:       "Running"
      ending-soon:   "Ending Soon"

# ──────────────────────────────────────────
# KOTH EVENT  (configured partly via events.yml)
# ──────────────────────────────────────────
koth:
  # These are defaults — override in events/<koth>.yml under the same keys.
