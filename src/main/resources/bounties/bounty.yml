bounty:

  # =========================
  # 💰 BOUNTY SETTINGS
  # =========================
  min: 100
  max: 100000

  # how often locations update (seconds)
  tracking-interval: 600

  # =========================
  # 🛰 SHOWCASE HOLOGRAM
  # =========================
  showcase:
    enabled: true
    id: "bounty_showcase"
    world: "world"
    x: 0.5
    y: 100.0
    z: 0.5
    yaw: 180.0
    pitch: 0.0
    text-y-offset: 2.35
    npc-y-offset: 0.0
    lines:
      - "&c&lBounty Terminal"
      - "&7Target &8• &f%target%"
      - "&7Value  &8• &6$%amount%"
      - "&7Sector &8• &f%location%"
      - "&7Status &8• %status%"

  # =========================
  # 🖥 GUI SETTINGS
  # =========================
  gui:
    title: "&c&lActive Bounties"
    size: 54

  # =========================
  # 🧱 FILLER ITEM
  # =========================
  filler:
    material: BLACK_STAINED_GLASS_PANE
    name: " "
    lore: []

  # =========================
  # 💬 MESSAGES
  # =========================
  messages:
    placed: "&aYou placed a bounty on &e%target% &afor &6$%amount%"
    broadcast: "&c⚠ &e%target% &chas a bounty of &6$%amount%"
    removed: "&cYou removed your bounty on &e%target% &cand were refunded."
    already-has: "&cYou already placed a bounty."
    self: "&cYou cannot place a bounty on yourself."
    not-enough: "&cNot enough money."